<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dan Lifestyle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body x-data="app" x-init="init()">

  <!-- Auth Gate -->
  <template x-if="authRequired && !authed">
    <div style="display:flex; align-items:center; justify-content:center; height:100vh; padding:20px;">
      <div style="width:100%; max-width:300px; text-align:center;">
        <div style="font-size:18px; font-weight:700; color:var(--text-primary); margin-bottom:24px;">Lifestyle</div>
        <input type="password" class="text-input" placeholder="Password" x-model="authPassword"
               @keydown.enter="submitAuth()" style="text-align:center; margin-bottom:12px;">
        <button class="toggle-btn active" style="width:100%; padding:12px;" @click="submitAuth()">Enter</button>
        <div x-show="authError" style="color:var(--red); font-size:13px; margin-top:12px;" x-text="authError"></div>
      </div>
    </div>
  </template>

  <!-- Main App (hidden until authed) -->
  <template x-if="!authRequired || authed">
  <div>

  <!-- Save Toast -->
  <div class="save-toast" :class="{ show: toast.show, error: toast.error }" x-text="toast.message"></div>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title" x-text="greeting"></div>
      <div class="header-date" x-text="dateLabel"></div>
    </div>
    <button style="background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer; padding:4px 8px;"
            @click="drawer = 'settings'">&#9881;</button>
  </div>

  <!-- ===================== LOG VIEW ===================== -->
  <div class="container" x-show="view === 'log'" x-cloak>

    <!-- Done-for-today closure -->
    <template x-if="doneForToday">
      <div style="text-align: center; padding: 80px 20px;">
        <div style="font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; animation: fadeIn 0.6s ease;">You're done. Go live.</div>
        <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 24px;">Everything's logged for today.</div>
        <a href="#" @click.prevent="doneForToday = false" style="font-size: 13px; color: var(--accent); text-decoration: underline;">Undo</a>
      </div>
    </template>

    <template x-if="!doneForToday">
      <div>

        <!-- Quick Log -->
        <div class="card">
          <div style="display: flex; gap: 8px;">
            <input type="text" class="text-input" placeholder="Swam 30 min, ate dosa, tried pottery..."
                   x-model="quickLogText" @keydown.enter="parseQuickLog()" style="flex: 1;">
            <button class="toggle-btn active" style="flex: none; width: 56px;" @click="parseQuickLog()">Send</button>
          </div>
        </div>

        <!-- Alert Banner -->
        <template x-if="alerts.length > 0">
          <div>
            <template x-for="alert in alerts" :key="alert.id">
              <div class="alert" :class="'alert-' + alert.type" x-text="alert.message"></div>
            </template>
          </div>
        </template>

        <!-- SLEEP CARD — shows 7AM-2PM -->
        <div class="card" x-show="shouldShow('sleep')">
          <div class="card-header">
            <span class="card-title">Sleep last night</span>
            <span class="card-badge" x-show="today.sleep_hours" x-text="today.sleep_hours + 'h'"></span>
          </div>
          <div class="time-row">
            <label>Slept</label>
            <input type="time" class="time-input" x-model="today.sleep_start" @change="saveDailyField('sleep_start')">
          </div>
          <div class="time-row">
            <label>Woke</label>
            <input type="time" class="time-input" x-model="today.sleep_end" @change="saveDailyField('sleep_end')">
          </div>
          <div class="toggle-row">
            <button class="toggle-btn" :class="{ active: today.sleep_quality === 1 }" @click="setSleepQuality(1)">Groggy</button>
            <button class="toggle-btn" :class="{ active: today.sleep_quality === 2 }" @click="setSleepQuality(2)">Okay</button>
            <button class="toggle-btn" :class="{ active: today.sleep_quality === 3 }" @click="setSleepQuality(3)">Rested</button>
          </div>
          <div class="toggle-row">
            <button class="toggle-btn" :class="{ active: today.morning_sunlight }" @click="toggleDaily('morning_sunlight')">
              Morning sunlight
            </button>
          </div>
          <div class="time-row">
            <label>HRV</label>
            <input type="number" class="time-input" placeholder="e.g. 45" min="1" max="200"
                   x-model.number="today.hrv_morning" @change="saveDailyField('hrv_morning')"
                   style="font-family: var(--font-mono);">
            <span class="text-sm text-muted" x-show="today.hrv_morning"
                  :class="{ 'text-green': today.hrv_morning >= hrvBaseline, 'text-red': today.hrv_morning < hrvBaseline * 0.85 }"
                  x-text="today.hrv_morning >= hrvBaseline ? 'Good' : today.hrv_morning >= hrvBaseline * 0.85 ? 'Okay' : 'Recovery day'"></span>
          </div>
        </div>

        <!-- ENERGY CARD — always -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Right now</span>
            <span class="card-badge" x-text="currentEnergySlot"></span>
          </div>
          <div class="dot-row">
            <span class="dot-label">Energy</span>
            <div class="dot-group">
              <template x-for="n in 5" :key="'e'+n">
                <button class="dot" :class="{ active: currentEnergy.energy >= n }" @click="setEnergy('energy', n)" x-text="n"></button>
              </template>
            </div>
          </div>
          <div class="dot-row">
            <span class="dot-label">Mood</span>
            <div class="dot-group">
              <template x-for="n in 5" :key="'m'+n">
                <button class="dot" :class="{ active: currentEnergy.mood >= n }" @click="setEnergy('mood', n)" x-text="n"></button>
              </template>
            </div>
          </div>
          <div class="dot-row">
            <span class="dot-label">Focus</span>
            <div class="dot-group">
              <template x-for="n in 5" :key="'f'+n">
                <button class="dot" :class="{ active: currentEnergy.focus >= n }" @click="setEnergy('focus', n)" x-text="n"></button>
              </template>
            </div>
          </div>
        </div>

        <!-- HABITS CARD — shows 9PM+ -->
        <div class="card" x-show="shouldShow('habits')">
          <div class="card-header">
            <span class="card-title">Habits</span>
            <span class="card-badge" x-text="habitsCompletedOf14 + ' of 14'"></span>
          </div>
          <template x-for="habit in activeHabits" :key="habit.id">
            <div>
              <div class="habit-row">
                <span class="habit-name" x-text="habit.name"></span>
                <button class="habit-floor" :class="{ active: getHabitLog(habit.id)?.floor_used }"
                        @click="toggleFloor(habit.id)" x-show="getHabitLog(habit.id)?.did_it">floor</button>
                <button class="habit-check skip"
                        :class="{ active: getHabitLog(habit.id)?.did_it === false }"
                        @click="skipHabit(habit.id)"
                        x-show="!getHabitLog(habit.id)?.did_it">
                  <span>Skip</span>
                </button>
                <button class="habit-check"
                        :class="{ done: getHabitLog(habit.id)?.did_it === true, missed: getHabitLog(habit.id)?.did_it === false }"
                        @click="toggleHabit(habit.id)">
                  <span x-text="getHabitLog(habit.id)?.did_it === true ? '\u2713' : getHabitLog(habit.id)?.did_it === false ? '\u2717' : '\u00B7'"></span>
                </button>
              </div>
              <!-- Skip reason row -->
              <div class="toggle-row mt-8" x-show="skipReasonHabitId === habit.id" x-transition>
                <button class="toggle-btn" style="font-size:11px; padding:6px;" @click="setMissType('low_energy')">Low energy</button>
                <button class="toggle-btn" style="font-size:11px; padding:6px;" @click="setMissType('no_time')">No time</button>
                <button class="toggle-btn" style="font-size:11px; padding:6px;" @click="setMissType('forgot')">Forgot</button>
                <button class="toggle-btn" style="font-size:11px; padding:6px;" @click="setMissType('external')">External</button>
                <button class="toggle-btn" style="font-size:11px; padding:6px;" @click="setMissType('planned_skip')">Planned</button>
              </div>
            </div>
          </template>
        </div>

        <!-- MEALS CARD — always -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Meals</span>
            <span class="card-badge" x-text="mealsLoggedToday + ' logged'"></span>
          </div>
          <template x-for="slot in mealSlots" :key="slot">
            <div class="flex-between" style="padding: 8px 0; border-bottom: 1px solid var(--border);">
              <span style="font-size: 13px; text-transform: capitalize;" x-text="slot.replace('_',' ')"></span>
              <div class="flex gap-8">
                <button class="toggle-btn" style="padding: 6px 10px; flex: none;"
                        :class="{ active: getMealLog(slot)?.protein === 'high' }"
                        @click="logMeal(slot, 'high')">High P</button>
                <button class="toggle-btn" style="padding: 6px 10px; flex: none;"
                        :class="{ active: getMealLog(slot)?.protein === 'med' }"
                        @click="logMeal(slot, 'med')">Med P</button>
                <button class="toggle-btn" style="padding: 6px 10px; flex: none;"
                        :class="{ 'active-red': getMealLog(slot)?.was_junk }"
                        @click="toggleMealJunk(slot)">Junk</button>
              </div>
            </div>
          </template>
        </div>

        <!-- END OF DAY CARD — shows 10PM+ -->
        <div class="card" x-show="shouldShow('eod')">
          <div class="card-header">
            <span class="card-title">End of day</span>
          </div>
          <div class="mb-8">
            <select class="select" x-model="today.day_type" @change="saveDailyField('day_type')">
              <option value="">Day type...</option>
              <option value="routine">Routine</option>
              <option value="disrupted">Disrupted</option>
              <option value="travel">Travel</option>
              <option value="social-heavy">Social heavy</option>
              <option value="recovery">Recovery</option>
            </select>
          </div>
          <div class="dot-row">
            <span class="dot-label">Decisions</span>
            <div class="dot-group">
              <template x-for="n in 5" :key="'d'+n">
                <button class="dot" :class="{ active: today.decision_load >= n }" @click="setDailyDot('decision_load', n)" x-text="n"></button>
              </template>
            </div>
          </div>
          <div class="mb-8">
            <input type="text" class="text-input" placeholder="Mood word..." x-model="today.mood_word"
                   @change="saveDailyField('mood_word')" maxlength="30">
          </div>
          <div>
            <input type="text" class="text-input" placeholder="Highlight of the day..."
                   x-model="today.highlight" @change="saveDailyField('highlight')">
          </div>
        </div>

        <!-- ===== READING CARD — shows 8PM+ ===== -->
        <div class="card" x-show="shouldShow('reading')">
          <!-- Active Book -->
          <template x-if="activeBook">
            <div>
              <div class="card-header">
                <span class="card-title">Reading Now</span>
                <span class="card-badge" x-text="activeBook.progress_pct + '%'"></span>
              </div>
              <div class="reading-title" x-text="activeBook.title + (activeBook.author ? ' — ' + activeBook.author : '')"></div>
              <div class="reading-meta">
                <span x-text="activeBook.format || 'kindle'"></span>
                <template x-if="activeBook.started_date">
                  <span x-text="'· Started ' + daysAgo(activeBook.started_date) + 'd ago'"></span>
                </template>
              </div>
              <div class="progress-bar mt-8">
                <div class="progress-fill" :style="'width:' + (activeBook.progress_pct || 0) + '%'"></div>
              </div>
              <!-- Enjoyment prompt -->
              <div class="toggle-row mt-8" x-show="shouldPromptEnjoyment()">
                <span class="text-sm text-muted" style="flex:none;">Enjoying it?</span>
                <button class="toggle-btn" :class="{ active: activeBook.enjoyment === 'yes' }" @click="setEnjoyment('yes')">Yes</button>
                <button class="toggle-btn" :class="{ active: activeBook.enjoyment === 'meh' }" @click="setEnjoyment('meh')">Meh</button>
                <button class="toggle-btn" :class="{ 'active-red': true }" @click="setEnjoyment('drop')" style="border-color:var(--red); color:var(--red);">Drop</button>
              </div>
              <div class="flex gap-8 mt-8">
                <button class="toggle-btn active" style="flex:1;" @click="readingForm.item_id = activeBook.id; drawer = 'reading'">Log session</button>
                <button class="toggle-btn" style="flex:none; padding:8px 12px;" @click="completeBook()">Finished</button>
              </div>
            </div>
          </template>

          <!-- No active book but queue exists -->
          <template x-if="!activeBook && readingQueue.length > 0">
            <div>
              <div class="card-header"><span class="card-title">Start reading</span></div>
              <div class="reading-title" x-text="readingQueue[0].title + (readingQueue[0].author ? ' — ' + readingQueue[0].author : '')"></div>
              <button class="toggle-btn active mt-8" style="width:100%;" @click="startBook(readingQueue[0].id)">Start this one</button>
            </div>
          </template>

          <!-- No active book, no queue -->
          <template x-if="!activeBook && readingQueue.length === 0">
            <div>
              <div class="card-header"><span class="card-title">Reading</span></div>
              <div class="text-sm text-muted">Nothing queued. Add something.</div>
            </div>
          </template>

          <!-- Queue -->
          <div x-show="readingQueue.length > 0" style="margin-top:16px; border-top:1px solid var(--border); padding-top:12px;">
            <div class="card-title mb-8">Up next</div>
            <template x-for="book in readingQueue" :key="book.id">
              <div class="flex-between" style="padding:6px 0;">
                <span style="font-size:13px;" x-text="book.title"></span>
                <button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:4px 8px;" @click="removeFromQueue(book.id)">✕</button>
              </div>
            </template>
          </div>
          <button class="toggle-btn mt-8" style="width:100%;" @click="drawer = 'add-book'" x-show="readingQueue.length < 5">+ Add to queue</button>

          <!-- Completed -->
          <div x-show="completedBooks.length > 0" style="margin-top:16px; border-top:1px solid var(--border); padding-top:12px;">
            <details>
              <summary style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); cursor:pointer;">
                Completed (<span x-text="completedBooks.length"></span>)
              </summary>
              <template x-for="book in completedBooks" :key="book.id">
                <div style="padding:8px 0; border-bottom:1px solid var(--border);">
                  <div style="font-size:13px; font-weight:600;" x-text="book.title"></div>
                  <div class="flex-between">
                    <span class="text-xs text-muted" x-text="(book.takeaway_count || 0) + ' takeaways'"></span>
                    <button class="text-xs" style="background:none; border:none; color:var(--accent); cursor:pointer;"
                            @click="openTakeawayDrawer('book', book.title, book.id)" x-show="book.takeaway_count < 3">+ Takeaway</button>
                  </div>
                </div>
              </template>
            </details>
          </div>
        </div>

        <!-- ===== PODCAST CARD — shows 8PM+ or weekends ===== -->
        <div class="card" x-show="shouldShow('podcast')">
          <div class="card-header">
            <span class="card-title">Listening</span>
            <span class="card-badge" x-text="podcastsThisWeek + ' this week'"></span>
          </div>

          <!-- Last listened -->
          <template x-if="lastPodcast">
            <div>
              <div style="font-size:14px; font-weight:600;" x-text="lastPodcast.show"></div>
              <div style="font-size:13px; color:var(--text-secondary); margin-top:2px;" x-text="lastPodcast.episode_title"></div>
              <div class="reading-meta">
                <span x-text="daysAgo(lastPodcast.date) === 0 ? 'Today' : daysAgo(lastPodcast.date) + 'd ago'"></span>
                <template x-if="lastPodcast.context"><span x-text="'· ' + lastPodcast.context"></span></template>
              </div>
              <!-- Takeaway prompt -->
              <div class="toggle-row mt-8" x-show="lastPodcast.captured_takeaway === null || lastPodcast.captured_takeaway === undefined">
                <span class="text-sm text-muted" style="flex:none;">Takeaway?</span>
                <button class="toggle-btn" @click="openTakeawayDrawer('podcast', lastPodcast.show + ' — ' + lastPodcast.episode_title, lastPodcast.id)">Capture</button>
                <button class="toggle-btn" @click="skipPodcastTakeaway(lastPodcast.id)">Skip</button>
              </div>
              <div x-show="lastPodcast.captured_takeaway === true" class="text-sm" style="color:var(--green); margin-top:8px;">Takeaway captured</div>
            </div>
          </template>

          <template x-if="!lastPodcast">
            <div class="text-sm text-muted">No listens logged yet.</div>
          </template>

          <!-- Queued episodes -->
          <div x-show="podcastQueue.length > 0" style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
            <div class="card-title mb-8">Queued</div>
            <template x-for="ep in podcastQueue" :key="ep.id">
              <div class="flex-between" style="padding:6px 0;">
                <div style="flex:1; min-width:0;">
                  <div style="font-size:12px; font-weight:600; color:var(--text-secondary);" x-text="ep.show"></div>
                  <div style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="ep.episode_title"></div>
                </div>
                <button class="toggle-btn" style="padding:4px 10px; font-size:11px; flex:none; margin-left:8px;" @click="markListened(ep.id)">Done</button>
              </div>
            </template>
          </div>

          <div class="flex gap-8 mt-8">
            <button class="toggle-btn" style="flex:1;" @click="drawer = 'log-podcast'">+ Log a listen</button>
            <button class="toggle-btn" style="flex:1;" @click="drawer = 'queue-podcast'" x-show="podcastQueue.length < 3">+ Queue episode</button>
          </div>
        </div>

        <!-- Quick-add buttons -->
        <div class="flex gap-8 mb-8" style="margin-top: 4px;">
          <button class="toggle-btn" style="flex: 1;" @click="drawer = 'exercise'">+ Exercise</button>
          <button class="toggle-btn" style="flex: 1;" @click="drawer = 'experience'">+ Experience</button>
        </div>

        <!-- Done for Today -->
        <button class="toggle-btn active" @click="markDoneForToday()"
                style="width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-color: var(--green); background: var(--green-dim); color: var(--green); margin-bottom: 16px;">
          Done for Today
        </button>

      </div>
    </template>

  </div>

  <!-- ===================== COACH VIEW ===================== -->
  <div class="container coach-container" x-show="view === 'coach'" x-cloak>

    <!-- Active Experiment -->
    <div class="card" x-show="activeExperiment" style="border-color: var(--accent);">
      <div class="card-header">
        <span class="card-title">Active Experiment</span>
        <span class="card-badge" x-text="activeExperiment?.days_remaining + 'd left'"></span>
      </div>
      <div style="font-size: 14px; font-weight: 600; margin-bottom: 8px;" x-text="activeExperiment?.name"></div>
      <div class="flex-between">
        <span class="text-sm text-muted">Did it today?</span>
        <div class="flex gap-8">
          <button class="toggle-btn" style="padding: 6px 16px; flex: none;"
                  :class="{ active: activeExperiment?.did_today === true }"
                  @click="logExperimentDay(true)">Yes</button>
          <button class="toggle-btn" style="padding: 6px 16px; flex: none;"
                  :class="{ 'active-red': activeExperiment?.did_today === false }"
                  @click="logExperimentDay(false)">No</button>
        </div>
      </div>
    </div>

    <!-- Coach Selector -->
    <div class="coach-pills">
      <template x-for="c in ['coach','james','andrew','naval','ali','rory']" :key="c">
        <button class="coach-pill"
                :class="{ active: chatCoach === c }"
                :style="chatCoach === c ? 'border-color:' + coachColors[c] + '; color:' + coachColors[c] + '; background:' + coachColors[c] + '18' : ''"
                @click="selectCoach(c)"
                x-text="coachDisplayName(c)"></button>
      </template>
    </div>

    <!-- Data-driven nudges (collapsed) -->
    <template x-if="coachMessages.length > 0">
      <div class="card" style="padding: 8px 12px;">
        <details>
          <summary style="font-size: 12px; color: var(--text-muted); cursor: pointer;">
            <span x-text="coachMessages.length + ' nudge' + (coachMessages.length > 1 ? 's' : '')"></span> today
          </summary>
          <div style="margin-top: 8px;">
            <template x-for="(msg, i) in coachMessages" :key="'cm'+i">
              <div style="padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;">
                <span style="font-weight: 700; font-size: 11px; letter-spacing: 0.04em;"
                      :style="{ color: {James:'#3b82f6', Andrew:'#22c55e', Naval:'#a78bfa', Ali:'#f59e0b', Rory:'#ec4899'}[msg.coach] || 'var(--text-secondary)' }"
                      x-text="msg.coach"></span>
                <span style="color: var(--text-secondary); margin-left: 6px;" x-text="msg.message"></span>
              </div>
            </template>
          </div>
        </details>
      </div>
    </template>

    <!-- Chat Messages -->
    <div class="chat-messages" id="chat-scroll">
      <template x-if="chatMessages.length === 0 && availableCoaches.length > 0">
        <div style="text-align: center; padding: 40px 20px;">
          <div style="font-size: 14px; color: var(--text-muted); line-height: 1.6;">
            Talk to <span :style="'color:' + coachColors[chatCoach]" x-text="coachDisplayName(chatCoach)"></span>
          </div>
        </div>
      </template>
      <template x-if="chatMessages.length === 0 && availableCoaches.length === 0">
        <div style="text-align: center; padding: 40px 20px;">
          <div style="font-size: 14px; color: var(--text-muted); line-height: 1.6;">
            Coaches are offline.<br>Use Claude Code for coaching sessions.
          </div>
        </div>
      </template>

      <template x-for="(msg, i) in chatMessages" :key="'ch'+i">
        <div class="chat-bubble" :class="msg.role === 'user' ? 'chat-user' : 'chat-coach'">
          <template x-if="msg.role === 'assistant'">
            <div class="chat-coach-name"
                 :style="'color:' + coachColors[msg.coach || chatCoach]"
                 x-text="coachDisplayName(msg.coach || chatCoach)"></div>
          </template>
          <div class="chat-text" x-text="msg.content"></div>
        </div>
      </template>

      <template x-if="chatStreaming">
        <div class="chat-typing">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
      </template>
    </div>

    <!-- Chat Input -->
    <div class="chat-input-bar" x-show="availableCoaches.length > 0">
      <input type="text" class="chat-input" placeholder="Ask your coach..."
             x-model="chatInput" @keydown.enter="sendChat()" :disabled="chatStreaming">
      <button class="chat-send" @click="sendChat()" :disabled="chatStreaming || !chatInput.trim()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <input type="time" class="time-input" x-model="onboard.wakeTime" value="10:00">

            <div class="card-title mb-8">What time do you sleep?</div>

          <button class="toggle-btn active" style="width:100%; padding:12px; margin-top:16px;" @click="onboardStep = 2">Next</button>
        </div>
        <!-- Step 2 -->

          </div>
          <button class="toggle-btn active" style="width:100%; padding:12px; margin-top:16px;" @click="onboardStep = 3">Next</button>

        <!-- Step 3 -->

          <div style="font-size:20px; font-weight:700; margin-bottom:16px;">Reading anything right now?</div>
          <input type="text" class="text-input mb-8" placeholder="Book title..." x-model="onboard.bookTitle">
          <input type="text" class="text-input mb-8" placeholder="Author..." x-model="onboard.bookAuthor">

          <button class="toggle-btn active" style="width:100%; padding:12px;" @click="onboardStep = 4">Next</button>
        </div>
        <!-- Step 4 -->
        <div x-show="onboardStep === 4">
          <div style="font-size:20px; font-weight:700; margin-bottom:16px;">Food situation</div>
          <div class="toggle-row" style="flex-wrap:wrap;">
            <button class="toggle-btn" :class="{ active: onboard.food === 'cook' }" @click="onboard.food = 'cook'">Have a cook</button>
            <button class="toggle-btn" :class="{ active: onboard.food === 'self' }" @click="onboard.food = 'self'">Cook myself</button>
            <button class="toggle-btn" :class="{ active: onboard.food === 'order' }" @click="onboard.food = 'order'">Mostly order in</button>
            <button class="toggle-btn" :class="{ active: onboard.food === 'mix' }" @click="onboard.food = 'mix'">Mix of everything</button>
          </div>
          <button class="toggle-btn active" style="width:100%; padding:12px; margin-top:16px;" @click="onboardStep = 5">Next</button>
        </div>
        <!-- Step 5 -->
        <div x-show="onboardStep === 5">
          <div style="font-size:20px; font-weight:700; margin-bottom:16px;">One thing to change</div>
          <div style="color:var(--text-secondary); font-size:14px; margin-bottom:16px;">What's the ONE habit or pattern you want to work on first?</div>

                  @click="completeOnboarding()">Start tracking</button>
        </div>
      </div>
    </div>

              x-model="takeawayForm.text" style="resize:none;"></textarea>
    <input type="text" class="text-input mb-8" placeholder="Applied to... (what changed in your life?)"
           x-model="takeawayForm.appliedTo">
    <button class="toggle-btn active" style="width:100%;" @click="saveTakeaway()">Save</button>
    <div class="text-xs text-muted mt-8" x-text="takeawayCount + ' of 3 logged'"></div>
  </div>

  <!-- Apply Takeaway Drawer -->
  <div class="drawer-overlay" :class="{ open: drawer === 'apply-takeaway' }" @click="drawer = null"></div>
  <div class="drawer" :class="{ open: drawer === 'apply-takeaway' }">
    <div class="drawer-handle"></div>
    <div class="card-title mb-8">Apply Takeaway</div>
    <div class="text-sm text-muted mb-8">What changed because of this insight?</div>
    <input type="text" class="text-input mb-8" placeholder="Applied to..." x-model="takeawayForm.appliedTo">
    <button class="toggle-btn active" style="width:100%;" @click="submitApplyTakeaway()">Save</button>
  </div>

  <!-- ===================== BOTTOM TAB BAR ===================== -->
  <div class="quick-add">
    <button class="quick-add-btn" :class="{ active: view === 'log' }" @click="view = 'log'"
            :style="view === 'log' ? 'border-color: var(--accent); color: var(--text-primary); background: var(--accent-dim);' : ''">
      Log
    </button>
    <button class="quick-add-btn" :class="{ active: view === 'coach' }" @click="view = 'coach'"
            :style="view === 'coach' ? 'border-color: var(--accent); color: var(--text-primary); background: var(--accent-dim);' : ''">
      Coach
    </button>
    <button class="quick-add-btn" :class="{ active: view === 'status' }" @click="view = 'status'"
            :style="view === 'status' ? 'border-color: var(--accent); color: var(--text-primary); background: var(--accent-dim);' : ''">
      Status
    </button>
  </div>

  </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  <script src="js/app.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
